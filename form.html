<body>
    
<selection class ="form">

       <div class="inp">

        <input id="Nome" type="text" class="input" required>
        <label for="Nome">Digita o seu nome</label>
        </div><br>

        </div><br>
        
        <div class="_input">

         </div>    
            
            <br>
    </div>

</form>
</div>
